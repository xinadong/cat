server:
  port: 8080

spring:
  application:
    name: animal-backend
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/animal_db000?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT配置
jwt:
  secret: animalScienceWebsiteSecretKey2024ForJWTTokenGeneration
  expiration: 604800000  # 7天

# 文件上传配置
file:
  upload-path: ./uploads/
  access-path: /uploads/**

# AI配置
ai:
  api-key: sk-68d36520101d42a09c184e9316d10521  # 从环境变量读取，或者直接填写：sk-xxx
  base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
  model: qwen-plus

